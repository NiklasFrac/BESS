# =============================================================================
# Logging
# =============================================================================
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"


# =============================================================================
# Time Settings
# =============================================================================
time:
  start_utc: "2020-01-01 00:00:00"
  end_utc: "2025-01-01 00:00:00"
  freq: "10min"              # Solar / Energy data
  interval_minutes: 15       # Firm data


# =============================================================================
# Station
# =============================================================================
station:
  id: "00232"
  name: "Augsburg"


# =============================================================================
# URLs
# =============================================================================
url:
  air_temp_url: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/air_temperature/historical/10minutenwerte_TU_00232_20200101_20251231_hist.zip"
  wind_url: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/wind/historical/10minutenwerte_wind_00232_20200101_20251231_hist.zip"
  metadata: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/air_temperature/historical/zehn_min_tu_Beschreibung_Stationen.txt"
  solar: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/solar/historical/10minutenwerte_SOLAR_00232_20200101_20251231_hist.zip"


# =============================================================================
# Paths
# =============================================================================
paths:
  # ---------------------------------------------------------------------------
  # PV / Solar
  # ---------------------------------------------------------------------------
  metadata: "data/pv/metadata_stations.csv"
  meteo: "data/pv/dwd_temp_pressure_wind_10min_2020_2024.csv"
  true_sun_position: "data/pv/true_solar_position_2020_2024_10min.csv"
  apparent: "data/pv/apparent_solar_position_2020_2024_10min.csv"
  solar: "data/pv/dwd_solar_data_10min_2020_2024.csv"
  dni: "data/pv/dni_2020_2024_10min.csv"
  pvgis: "data/pv/pvgis_horizon_augsburg.csv"
  poa: "data/pv/poa.csv"
  effective_irradiance: "data/pv/effective_irradiance.csv"
  energy: "results/energy_curve.csv"

  # ---------------------------------------------------------------------------
  # Market Data
  # ---------------------------------------------------------------------------
  smard: "data/market/smard_day_ahead_de_lu_hourly_2020_2024.csv"

  # ---------------------------------------------------------------------------
  # Firm Data
  # ---------------------------------------------------------------------------
  raw: "data/firm/LoadProfile_30IPs_2017.csv"
  costs: "data/firm/annual_energy_costs_2017.csv"
  test_set: "data/firm/LoadProfile_20IPs_2016.csv"
  # ---------------------------------------------------------------------------
  # Battery
  # ---------------------------------------------------------------------------
  bat_sim: "data/battery/battery_sim.parquet"
  bat_temp: "data/battery/battery_temperature.parquet"


# =============================================================================
# SMARD Market Data
# =============================================================================
smard:
  filter_id: 4169
  region: "DE-LU"
  resolution: "hour"
  base_url: "https://www.smard.de/app/chart_data"


# =============================================================================
# DNI
# =============================================================================
dni:
  timestamp_col: "timestamp_utc"
  dwd_missing_value: -999.0
  low_sun_zenith_deg: 88.0


# =============================================================================
# PV System
# =============================================================================
pv:
  surface_tilt: 20
  surface_azimuth: 180
  albedo: 0.20

  module_pdc0: 495.0          # DC-Nennleistung eines Moduls in W bei STC
  gamma_pdc: -0.0029         # Relativer Leistungsabfall pro °C
  module_count: 1584         # Anzahl identischer Module


# =============================================================================
# Inverter
# =============================================================================
inverter:
  pac0_each: 110000.0        # AC-Nennleistung eines Inverters in W
  inverter_count: 6          # Anzahl identischer Inverter
  eta_inv_nom: 0.982         # Nominaler Wirkungsgrad


# =============================================================================
# PV Losses
# =============================================================================
losses:
  annual_age_loss_pct: 0.5


# =============================================================================
# Energy Cost / Tariff
# =============================================================================
tariff:
  energy_price_eur_per_kwh: 0.25
  demand_charge_eur_per_kw_year: 100.0


# =============================================================================
# Battery
# =============================================================================
batterie:
  capacity_kwh: 100.0
  soc_min: 0.05
  soc_max: 0.95

  charge:
    max_kw: 50.0
    eta_nominal: 0.96
    loss_factor_cold: 1.5 # for eta only
    loss_factor_hot: 1.3
    hard_min: 0.0
    optimal_min_temp: 5.0   
    optimal_max_temp: 40.0  
    hard_max: 45.0

  discharge:
    max_kw: 50.0
    eta_nominal: 0.96
    loss_factor_cold: 1.5
    loss_factor_hot: 1.3
    hard_min: -20.0
    optimal_min_temp: -10.0 
    optimal_max_temp: 45.0   
    hard_max: 55.0

# =============================================================================
# Battery Degradation
# =============================================================================
degradation:
  cycle_fade_per_efc_at_100dod: 2e-4
  dod_exponent: 1.5
  calendar_fade_per_year: 0.015


# =============================================================================
# Battery Thermal Model
# =============================================================================
thermal:
  initial_temp_degC: 20.0
  thermal_time_constant_h: 6.0
  heat_capacity_kwh_per_degC: 50.0
  heat_to_battery_fraction: 1.0
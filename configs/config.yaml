# =============================================================================
# Logging
# =============================================================================
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"


# =============================================================================
# Time Settings
# =============================================================================
time:
  timezone: "UTC"
  start_utc: "2024-01-01 00:00:00"
  end_utc: "2025-01-01 00:00:00"
  freq: "10min"              # Solar / Energy data
  interval_minutes: 15       # Firm data
  

# =============================================================================
# Station
# =============================================================================
station:
  id: "00232"
  name: "Augsburg Bayern"


# =============================================================================
# DNI
# =============================================================================
dni:
  timestamp_col: "timestamp_utc"
  dwd_missing_value: -999.0
  low_sun_zenith_deg: 88.0
  solar_unit: "jcm2"

# =============================================================================
# PV System
# =============================================================================
pv:
  surface_tilt: 20
  surface_azimuth: 180
  albedo: 0.20

  module_pdc0: 495.0         # DC-Nennleistung eines Moduls in W bei STC
  gamma_pdc: -0.0029         # Relativer Leistungsabfall pro °C
  module_count: 1584         


# =============================================================================
# Inverter
# =============================================================================
inverter:
  pac0_each: 110000.0        # AC-Nennleistung eines Inverters in W
  inverter_count: 8          
  eta_inv_nom: 0.98         


# =============================================================================
# PV Losses
# =============================================================================
losses:
  annual_age_loss_pct: 0.5


# =============================================================================
# URLs
# =============================================================================
url:
  air_temp_url: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/air_temperature/historical/10minutenwerte_TU_00232_20200101_20251231_hist.zip"
  wind_url: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/wind/historical/10minutenwerte_wind_00232_20200101_20251231_hist.zip"
  metadata: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/air_temperature/historical/zehn_min_tu_Beschreibung_Stationen.txt"
  solar: "https://opendata.dwd.de/climate_environment/CDC/observations_germany/climate/10_minutes/solar/historical/10minutenwerte_SOLAR_00232_20200101_20251231_hist.zip"

# =============================================================================
# Paths
# =============================================================================
paths:
  # ---------------------------------------------------------------------------
  # General
  # ---------------------------------------------------------------------------
  metadata: "data/pv/general/metadata_stations.csv"
  pvgis: "data/pv/general/pvgis_horizon_augsburg.csv"

  meteo: "data/pv/actual/dwd_meteo.csv"
  solar: "data/pv/actual/dwd_solar_data.csv"

  # ---------------------------------------------------------------------------
  # PV
  # ---------------------------------------------------------------------------
  true_sun_position: "data/pv/actual/debug/true_sp_10min.csv"
  apparent: "data/pv/actual/debug/apparent_sp.csv"
  dni: "data/pv/actual/debug/dni.csv"
  poa: "data/pv/actual/debug/poa.csv"
  effective_irradiance: "data/pv/actual/debug/effective_irradiance.csv"
  energy: "data/pv/actual/debug/energy_curve.csv"
  pv_output: "data/pv/actual/pv_output.csv"
  energy_plot: "data/visualisation/energy_plot.png"
  horizon_plot: "data/visualisation/horizon_plot.png"


  # ---------------------------------------------------------------------------
  # Firm Data
  # ---------------------------------------------------------------------------
  raw: "data/firm/LoadProfile_30IPs_2017.csv"
  single: "data/firm/LoadProfile_LG01_2017.csv"
  
  # ---------------------------------------------------------------------------
  # Battery
  # ---------------------------------------------------------------------------
  bat_sim: "data/battery/battery_sim.csv"
  bat_temp: "data/battery/battery_temperature.csv"
  bat_degradation: "data/battery/battery_degradation.csv"

  # ---------------------------------------------------------------------------
  # Optimizer
  # ---------------------------------------------------------------------------
  optimizer_dispatch: "data/optimizer/optimizer_dispatch.csv"

  # ---------------------------------------------------------------------------
  # Results
  # ---------------------------------------------------------------------------
  ems_baseline_dispatch: "data/results/baseline_dispatch.csv"
  ems_system_dispatch: "data/results/system_dispatch.csv"
  costs_plot: "data/results/plots/costs.png"
  duration_plot: "data/results/plots/duration_curve.png"
  kpi_table_plot: "data/results/plots/kpi_table.png"


# =============================================================================
# Energy Cost / Tariff
# =============================================================================
tariff:
  energy_price_eur_per_kwh: 0.25
  demand_charge_eur_per_kw_year: 100.0

# =============================================================================
# Battery
# =============================================================================
batterie:
  capacity_kwh: 100.0
  soc_min: 0.05
  soc_max: 0.95

  charge:
    max_kw: 50.0
    eta_nominal: 0.96
    loss_factor_cold: 1.5 # for eta only
    loss_factor_hot: 1.3  # for eta only
    hard_min: 0.0
    optimal_min_temp: 5.0   
    optimal_max_temp: 40.0  
    hard_max: 45.0

  discharge:
    max_kw: 50.0
    eta_nominal: 0.96
    loss_factor_cold: 1.5 # for eta only
    loss_factor_hot: 1.3  # for eta only
    hard_min: -20.0
    optimal_min_temp: -10.0 
    optimal_max_temp: 45.0   
    hard_max: 55.0

# =============================================================================
# Battery Degradation
# =============================================================================
degradation:
  cycle_fade_per_efc_at_100dod: 0.0001
  dod_exponent: 2.0
  cycle_reference_temp_degC: 25.0
  cycle_activation_energy_over_R_K: 3500.0  # typisch 3000-4500 K
  
  calendar_fade_at_1yr: 0.03
  calendar_reference_temp_degC: 25.0
  calendar_activation_energy_over_R_K: 6000.0  # meist höher als cycle
  
  calendar_low_soc_reference: 0.2    # Below 20%: penalty kicks in
  calendar_low_soc_factor: 1.5       # At 0%: 1.5x stress
  calendar_high_soc_reference: 0.8        # Above 80%: penalty kicks in
  calendar_high_soc_factor: 2.5      # At 100%: 2.5x stress

  c_rate_reference: 0.5
  c_rate_exponent: 1.0
# =============================================================================
# Battery Thermal Model
# =============================================================================
thermal:
  initial_temp_degC: 20.0
  thermal_time_constant_h: 6.0
  heat_capacity_kwh_per_degC: 50.0
  heat_to_battery_fraction: 1.0

# =============================================================================
# Optimizer
# =============================================================================
grid:
  p_grid_max_kw: 1000000.0

economics:
  battery_replacement_cost_eur: 50000.0
  expected_efc: 6000.0

optimizer:
  start_soc: 0.5
  p_peak_year_before_kw: 0.0
